  <!-- Google Fonts -->

  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    /* Hide scrollbars for a clean native-app feel */
    .scrollbar-none::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-none {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes scaleUp {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .animate-slideUp {
      animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .animate-fadeIn {
      animation: fadeIn 0.2s ease-out forwards;
    }
    .animate-scaleUp {
      animation: scaleUp 0.15s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
</head>
<body class="bg-stone-900 text-stone-100 min-h-screen">

  <!-- React Application Logic -->
  <script type="text/babel">

    // Custom Inline SVGs for consistent mobile rendering

      ),
      RotateCcw: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><polyline points="3 3 3 8 8 8"/></svg>

      Info: () => (

      BookOpen: () => (

      UserCheck: () => (

    const DEFAULT_WARDROBE = [
      {
        id: 'mock-1',
        name: 'Classic Beige Trench',
        category: 'Outerwear',
        colorName: 'Beige',
        colorHex: '#d5bfa5',
        pattern: 'Solid',
        style: 'Formal',
        weather: 'Cold',
        image: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23f5ebe0"/><path d="M30,20 L70,20 L80,90 L20,90 Z" fill="%23d5bfa5"/><circle cx="50" cy="40" r="3" fill="%234a3e3d"/><circle cx="50" cy="60" r="3" fill="%234a3e3d"/></svg>'
      },
      {
        id: 'mock-2',
        name: 'Vintage White Tee',
        category: 'Top',
        colorName: 'Off-White',
        colorHex: '#faf9f6',
        pattern: 'Solid',
        style: 'Casual',
        weather: 'Hot',
        image: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23f5ebe0"/><path d="M25,30 L35,20 L45,25 L55,25 L65,20 L75,30 L70,45 L65,45 L65,85 L35,85 L35,45 L30,45 Z" fill="%23faf9f6"/></svg>'
      },
      {
        id: 'mock-3',
        name: 'Relaxed Denim Jeans',
        category: 'Bottom',
        colorName: 'Denim Blue',
        colorHex: '#5b7c99',
        pattern: 'Solid',
        style: 'Casual',
        weather: 'Mild',
        image: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23f5ebe0"/><path d="M35,20 L65,20 L70,90 L52,90 L50,50 L48,90 L30,90 Z" fill="%235b7c99"/></svg>'
      },
      {
        id: 'mock-4',
        name: 'Minimalist Sneakers',
        category: 'Shoes',
        colorName: 'White',
        colorHex: '#ffffff',
        pattern: 'Solid',
        style: 'Minimalist',
        weather: 'Mild',
        image: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23f5ebe0"/><path d="M20,70 L50,55 L80,70 L80,80 L20,80 Z" fill="%23ffffff"/><rect x="35" y="72" width="30" height="4" fill="%23d1d5db"/></svg>'
      }
    ];

    function App() {
      const apiKey = ""; 

      const [wardrobe, setWardrobe] = useState(() => {
        const saved = localStorage.getItem('chicstack_wardrobe');
        return saved ? JSON.parse(saved) : DEFAULT_WARDROBE;
      });

      const [diary, setDiary] = useState(() => {
        const saved = localStorage.getItem('chicstack_diary');
        return saved ? JSON.parse(saved) : [];
      });

      const [activeTab, setActiveTab] = useState('wardrobe'); 
      const [filterCategory, setFilterCategory] = useState('All');
      const [filterStyle, setFilterStyle] = useState('All');

      const [isAddOpen, setIsAddOpen] = useState(false);
      const [uploadedImage, setUploadedImage] = useState(null); 
      const [isScanning, setIsScanning] = useState(false);
      const [newItemDetails, setNewItemDetails] = useState({
        name: '',
        category: 'Top',
        colorName: 'Black',
        colorHex: '#000000',
        pattern: 'Solid',
        style: 'Casual',
        weather: 'Mild'
      });

      const [selfieImage, setSelfieImage] = useState(null);
      const [isAnalyzingSelfie, setIsAnalyzingSelfie] = useState(false);
      const [selfieRating, setSelfieRating] = useState(null);

      const [equipped, setEquipped] = useState({
        Outerwear: null,
        Top: null,
        Bottom: null,
        Shoes: null,
        Accessory: null
      });

      const [isRating, setIsRating] = useState(false);
      const [showCoachModal, setShowCoachModal] = useState(false);
      const [rateResults, setRateResults] = useState(null);

      const [customModal, setCustomModal] = useState({
        isOpen: false,
        title: '',
        message: '',
        onConfirm: null,
        isConfirm: false
      });

      const triggerModal = (title, message, isConfirm = false, onConfirm = null) => {
        setCustomModal({ isOpen: true, title, message, onConfirm, isConfirm });
      };

      useEffect(() => {
        localStorage.setItem('chicstack_wardrobe', JSON.stringify(wardrobe));
      }, [wardrobe]);

      useEffect(() => {
        localStorage.setItem('chicstack_diary', JSON.stringify(diary));
      }, [diary]);

      const fileInputRef = useRef(null);
      const selfieInputRef = useRef(null);

      const processImageFile = (file, callback) => {
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 320;
            const scale = MAX_WIDTH / img.width;
            canvas.width = MAX_WIDTH;
            canvas.height = img.height * scale;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.65);
            callback(compressedBase64, file.name);
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        processImageFile(file, (compressedBase64, filename) => {
          setUploadedImage(compressedBase64);
          const cleanName = filename.split('.')[0].replace(/[-_]/g, ' ');
          setNewItemDetails(prev => ({
            ...prev,
            name: cleanName.charAt(0).toUpperCase() + cleanName.slice(1)
          }));
        });
      };

      const handleSelfieUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        processImageFile(file, (compressedBase64) => {
          setSelfieImage(compressedBase64);
          setSelfieRating(null);
        });
      };

      const callGeminiAPI = async (payload, endpoint) => {
        const maxRetries = 5;
        let delay = 1000;

        for (let attempt = 0; attempt < maxRetries; attempt++) {
          try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${endpoint}?key=${apiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });

            if (response.ok) return await response.json();
            
            if (response.status === 429 || (response.status >= 500 && response.status < 600)) {
              await new Promise(resolve => setTimeout(resolve, delay));
              delay *= 2;
              continue;
            }

            const errText = await response.text();
            throw new Error(`API Error ${response.status}: ${errText}`);
          } catch (err) {
            if (attempt === maxRetries - 1) throw err;
            await new Promise(resolve => setTimeout(resolve, delay));
            delay *= 2;
          }
        }
      };

      const handleAIScan = async () => {
        if (!uploadedImage) {
          triggerModal("Upload Photo", "Please snap/select a clothing image first.");
          return;
        }

        setIsScanning(true);
        const base64Data = uploadedImage.split(',')[1];

        const payload = {
          contents: [{
            parts: [
              {
                text: `Analyze this clothing photo. Tag it accurately. Return ONLY a raw JSON block following this template exactly (no other markdown wrapped):
                {
                  "name": "Short name (e.g., Slim Charcoal Blazer)",
                  "category": "Top" or "Bottom" or "Outerwear" or "Shoes" or "Accessory",
                  "colorName": "Muted color name",
                  "colorHex": "Hex value e.g. #3d3d3d",
                  "pattern": "Solid" or "Striped" or "Plaid" or "Graphic" or "Floral" or "Other",
                  "style": "Casual" or "Formal" or "Streetwear" or "Athletic" or "Boho" or "Minimalist",
                  "weather": "Hot" or "Cold" or "Mild" or "Rainy"
                }`
              },
              {
                inlineData: {
                  mimeType: "image/jpeg",
                  data: base64Data
                }
              }
            ]
          }],
          generationConfig: { responseMimeType: "application/json" }
        };

        try {
          const result = await callGeminiAPI(payload, "gemini-2.5-flash-preview-09-2025:generateContent");
          const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;
          
          if (textResponse) {
            const parsed = JSON.parse(textResponse);
            setNewItemDetails({
              name: parsed.name || newItemDetails.name,
              category: parsed.category || newItemDetails.category,
              colorName: parsed.colorName || newItemDetails.colorName,
              colorHex: parsed.colorHex || newItemDetails.colorHex,
              pattern: parsed.pattern || newItemDetails.pattern,
              style: parsed.style || newItemDetails.style,
              weather: parsed.weather || newItemDetails.weather
            });
            triggerModal("Tags Detected", "Gemini scanned your garment! Verify the tags below.");
          }
        } catch (err) {
          console.error(err);
          triggerModal("Scan Delayed", "AI scanner was unable to respond. Please write the item tags manually.");
        } finally {
          setIsScanning(false);
        }
      };

      const handleRateSelfie = async () => {
        if (!selfieImage) {
          triggerModal("Upload Selfie", "Capture or select a portrait of yourself first.");
          return;
        }

        setIsAnalyzingSelfie(true);
        const base64Data = selfieImage.split(',')[1];

        const payload = {
          contents: [{
            parts: [
              {
                text: `You are a high-end Digital Stylist. Analyze this portrait/selfie of a user wearing an outfit. Give detailed, playful style feedback from 3 virtual judges:
                1. "The Tailoring Purist" (checks symmetry, proportion, traditional balance)
                2. "The Streetwear Pioneer" (modern trends, silhouettes, streetwear aesthetics)
                3. "The Avant-Garde Analyst" (risk elements, accessories, color contrasts)

                Return ONLY a JSON response in this exact format (no markdown code fences or conversational text):
                {
                  "overallScore": 85,
                  "verdict": "Playful summary sentence praising the vibe of the outfit.",
                  "puristFeedback": "Paragraph critique here.",
                  "streetwearFeedback": "Paragraph critique here.",
                  "avantGardeFeedback": "Paragraph critique here.",
                  "strengths": ["Strengths list item 1", "Strengths list item 2"],
                  "suggestions": ["Upgrade suggestion 1", "Upgrade suggestion 2"]
                }`
              },
              {
                inlineData: {
                  mimeType: "image/jpeg",
                  data: base64Data
                }
              }
            ]
          }],
          generationConfig: { responseMimeType: "application/json" }
        };

        try {
          const result = await callGeminiAPI(payload, "gemini-2.5-flash-preview-09-2025:generateContent");
          const responseText = result.candidates?.[0]?.content?.parts?.[0]?.text;
          
          if (responseText) {
            setSelfieRating(JSON.parse(responseText));
          }
        } catch (err) {
          console.error(err);
          triggerModal("Analysis Failed", "Could not connect to the stylist AI right now.");
        } finally {
          setIsAnalyzingSelfie(false);
        }
      };

      return (
        <div className="max-w-md mx-auto p-4">
          <h1 className="text-2xl font-bold mb-4">ChicStack OOTD AI</h1>
          <p className="text-stone-400 mb-4">Your digital wardrobe interface is online.</p>
          {/* Main App Workspace UI Render Blocks go here */}
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
