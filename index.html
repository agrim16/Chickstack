<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ChicStack OOTD AI</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .scrollbar-none::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-none {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-stone-950 text-stone-100 min-h-screen antialiased">

  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useRef } = React;

    // Inline SVG Icon Components
    const ShirtIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.38 3.46 16 1.7a2 2 0 0 0-1.42 0l-4.38 1.76a2 2 0 0 1-1.42 0L4.4 1.76A2 2 0 0 0 3 3.52V19a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V3.52a2 2 0 0 0-.62-1.48z"/><path d="M12 21V13"/></svg>
    );
    const CameraIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
    );
    const SparklesIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
    );
    const LayersIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polygon points="2 17 12 22 22 17"/><polygon points="2 12 12 17 22 12"/></svg>
    );
    const TrashIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
    );
    const PlusIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
    );
    const XIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>
    );

    const DEFAULT_WARDROBE = [
      { id: 'mock-1', name: 'Classic Beige Trench', category: 'Outerwear', style: 'Formal' },
      { id: 'mock-2', name: 'Vintage White Tee', category: 'Top', style: 'Casual' },
      { id: 'mock-3', name: 'Relaxed Denim Jeans', category: 'Bottom', style: 'Casual' },
      { id: 'mock-4', name: 'Minimalist Sneakers', category: 'Shoes', style: 'Minimalist' }
    ];

    function App() {
      const [wardrobe, setWardrobe] = useState(DEFAULT_WARDROBE);
      const [activeTab, setActiveTab] = useState('wardrobe'); 
      const [filterCategory, setFilterCategory] = useState('All');
      const [isAddOpen, setIsAddOpen] = useState(false);
      const [uploadedImage, setUploadedImage] = useState('');

      const [newItemDetails, setNewItemDetails] = useState({
        name: '', category: 'Top', style: 'Casual'
      });

      const [equipped, setEquipped] = useState({
        Outerwear: null, Top: null, Bottom: null, Shoes: null, Accessory: null
      });

      const [selfieImage, setSelfieImage] = useState('');
      const [isAnalyzingSelfie, setIsAnalyzingSelfie] = useState(false);
      const [selfieRating, setSelfieRating] = useState(null);
      const [customModal, setCustomModal] = useState({ isOpen: false, title: '', message: '' });

      // Run local storage initialization strictly safe after mount
      useEffect(() => {
        try {
          const saved = localStorage.getItem('chicstack_wardrobe');
          if (saved) {
            setWardrobe(JSON.parse(saved));
          }
        } catch (e) {
          console.error(e);
        }
      }, []);

      // Save sync
      useEffect(() => {
        try {
          if (wardrobe !== DEFAULT_WARDROBE) {
            localStorage.setItem('chicstack_wardrobe', JSON.stringify(wardrobe));
          }
        } catch (e) {
          console.error(e);
        }
      }, [wardrobe]);

      const fileInputRef = useRef(null);
      const selfieInputRef = useRef(null);

      const triggerModal = (title, message) => {
        setCustomModal({ isOpen: true, title: title, message: message });
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          setUploadedImage(event.target.result);
          setNewItemDetails(prev => Object.assign({}, prev, { name: file.name.split('.')[0] }));
        };
        reader.readAsDataURL(file);
      };

      const handleAddItem = () => {
        if (!newItemDetails.name.trim()) return triggerModal("Missing Name", "Give your item a label!");
        const newItem = {
          id: 'item-' + Date.now(),
          name: newItemDetails.name,
          category: newItemDetails.category,
          style: newItemDetails.style,
          image: uploadedImage || ''
        };
        setWardrobe([newItem, ...wardrobe]);
        setIsAddOpen(false);
        setUploadedImage('');
        setNewItemDetails({ name: '', category: 'Top', style: 'Casual' });
      };

      const deleteItem = (id) => {
        setWardrobe(wardrobe.filter(item => item.id !== id));
      };

      const toggleEquip = (item) => {
        const currentEquippedInCategory = equipped[item.category];
        const isCurrentlyEquipped = currentEquippedInCategory && currentEquippedInCategory.id === item.id;
        
        setEquipped(prev => Object.assign({}, prev, {
          [item.category]: isCurrentlyEquipped ? null : item
        }));
      };

      const handleSelfieUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          setSelfieImage(event.target.result);
          setSelfieRating(null);
        };
        reader.readAsDataURL(file);
      };

      const simulateSelfieRating = () => {
        if (!selfieImage) return triggerModal("No Selfie", "Upload or snap an outfit portrait first.");
        setIsAnalyzingSelfie(true);
        setTimeout(() => {
          setSelfieRating({
            overallScore: 88,
            verdict: "Sharp color block sync! The modern clean layout holds excellent urban presence.",
            suggestions: ["Add a light silver chain accessory", "Try matching with dark-toned trousers"]
          });
          setIsAnalyzingSelfie(false);
        }, 1500);
      };

      const filteredWardrobe = filterCategory === 'All' 
        ? wardrobe 
        : wardrobe.filter(item => item.category === filterCategory);

      return (
        <div className="min-h-screen pb-24 max-w-md mx-auto bg-stone-900 shadow-2xl relative border-x border-stone-800">
          
          <header className="p-4 border-b border-stone-800 bg-stone-900/80 sticky top-0 z-40 backdrop-blur-md flex justify-between items-center">
            <div>
              <h1 className="text-xl font-bold tracking-tight text-stone-100">
                ChicStack <span className="text-xs px-2 py-0.5 rounded-full bg-amber-500/20 text-amber-400 font-mono">OOTD AI</span>
              </h1>
            </div>
            <button 
              onClick={() => setIsAddOpen(true)}
              className="p-2 bg-amber-500 text-stone-950 rounded-full font-bold shadow-lg hover:bg-amber-400"
            >
              <PlusIcon />
            </button>
          </header>

          <main className="p-4">
            
            {activeTab === 'wardrobe' && (
              <div>
                <div className="flex gap-2 overflow-x-auto pb-3 scrollbar-none mb-4">
                  {['All', 'Top', 'Bottom', 'Outerwear', 'Shoes', 'Accessory'].map(cat => (
                    <button
                      key={cat}
                      onClick={() => setFilterCategory(cat)}
                      className={`px-3 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition ${
                        filterCategory === cat ? 'bg-amber-500 text-stone-950' : 'bg-stone-800 text-stone-400'
                      }`}
                    >
                      {cat}
                    </button>
                  ))}
                </div>

                {filteredWardrobe.length === 0 ? (
                  <div className="text-center py-12 text-stone-500 border border-dashed border-stone-800 rounded-xl">
                    <p>No garments found.</p>
                  </div>
                ) : (
                  <div className="grid grid-cols-2 gap-3">
                    {filteredWardrobe.map(item => {
                      const isEquipped = equipped[item.category] && equipped[item.category].id === item.id;
                      return (
                        <div 
                          key={item.id} 
                          className={`p-3 rounded-xl bg-stone-800/50 border relative transition ${
                            isEquipped ? 'border-amber-500' : 'border-stone-800'
                          }`}
                        >
                          <div className="w-full h-24 rounded-lg bg-stone-800 mb-2 flex items-center justify-center overflow-hidden text-stone-500">
                            {item.image ? (
                              <img src={item.image} className="object-cover w-full h-full" alt="" />
                            ) : (
                              <ShirtIcon />
                            )}
                          </div>
                          <h3 className="text-xs font-semibold truncate text-stone-200">{item.name}</h3>
                          <div className="flex justify-between items-center mt-2">
                            <span className="text-[10px] text-stone-400 px-1.5 py-0.5 rounded bg-stone-900">{item.category}</span>
                            <div className="flex gap-1">
                              <button 
                                onClick={() => toggleEquip(item)}
                                className={`px-2 py-0.5 rounded text-[10px] font-bold ${isEquipped ? 'bg-amber-500 text-stone-950' : 'bg-stone-700 text-stone-300'}`}
                              >
                                {isEquipped ? 'Worn' : 'Wear'}
                              </button>
                              <button onClick={() => deleteItem(item.id)} className="p-1 text-stone-500 hover:text-red-400">
                                <TrashIcon />
                              </button>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}

            {activeTab === 'matcher' && (
              <div className="space-y-4">
                <div className="bg-stone-800/40 border border-stone-800 rounded-2xl p-4 space-y-3">
                  <h2 className="text-sm font-semibold text-stone-400 tracking-wider uppercase mb-2">Current Stack Workspace</h2>
                  {['Outerwear', 'Top', 'Bottom', 'Shoes', 'Accessory'].map(cat => (
                    <div key={cat} className="flex items-center justify-between p-3 rounded-xl bg-stone-900 border border-stone-800">
                      <span className="text-xs text-stone-400 font-medium">{cat}</span>
                      {equipped[cat] ? (
                        <div className="flex items-center gap-2">
                          <span className="text-xs font-semibold text-amber-400">{equipped[cat].name}</span>
                          <button onClick={() => setEquipped(prev => Object.assign({}, prev, {[cat]: null}))} className="text-stone-500">
                            <XIcon />
                          </button>
                        </div>
                      ) : (
                        <span className="text-xs text-stone-600 italic">Empty Slot</span>
                      )}
                    </div>
                  ))}
                </div>
                <button 
                  onClick={() => triggerModal("AI Coach Sync", "To review live configurations with Gemini, update your API connection configurations inside your dashboard pipeline constants.")}
                  className="w-full py-3 bg-amber-500 text-stone-950 font-bold rounded-xl flex items-center justify-center gap-2"
                >
                  <SparklesIcon /> Analyze Outfit Stack
                </button>
              </div>
            )}

            {activeTab === 'selfie' && (
              <div className="space-y-4">
                <div className="border border-dashed border-stone-800 rounded-2xl p-6 text-center bg-stone-900/50">
                  {selfieImage ? (
                    <div className="space-y-4">
                      <img src={selfieImage} className="max-h-64 mx-auto rounded-xl object-cover" alt="Selfie" />
                      <button onClick={() => setSelfieImage('')} className="text-xs text-red-400 underline">Remove Photo</button>
                    </div>
                  ) : (
                    <div onClick={() => selfieInputRef.current.click()} className="cursor-pointer space-y-2 py-4">
                      <div className="mx-auto w-12 h-12 rounded-full bg-stone-800 flex items-center justify-center text-stone-400">
                        <CameraIcon />
                      </div>
                      <p className="text-sm font-medium text-stone-300">Snap or Upload Fit Portrait</p>
                    </div>
                  )}
                  <input type="file" accept="image/*" ref={selfieInputRef} onChange={handleSelfieUpload} className="hidden" />
                </div>

                <button
                  onClick={simulateSelfieRating}
                  disabled={isAnalyzingSelfie}
                  className="w-full py-3 bg-stone-100 text-stone-950 font-bold rounded-xl disabled:opacity-50"
                >
                  {isAnalyzingSelfie ? 'Stylist Judges Critiquing...' : 'Submit to Virtual Judges Panel'}
                </button>

                {selfieRating && (
                  <div className="bg-stone-800/50 border border-stone-700/60 rounded-xl p-4 space-y-3">
                    <div className="flex justify-between items-center">
                      <h3 className="font-bold text-stone-200">Judges Statement Score</h3>
                      <span className="text-lg font-black text-amber-400">{selfieRating.overallScore}/100</span>
                    </div>
                    <p className="text-xs text-stone-300 italic">"{selfieRating.verdict}"</p>
                    <div className="pt-2 border-t border-stone-700/50">
                      <h4 className="text-xs font-semibold text-amber-400 mb-1">Stylist Action Targets:</h4>
                      <ul className="list-disc pl-4 text-xs text-stone-400 space-y-1">
                        {selfieRating.suggestions.map((s, i) => <li key={i}>{s}</li>)}
                      </ul>
                    </div>
                  </div>
                )}
              </div>
            )}

          </main>

          {isAddOpen && (
            <div className="fixed inset-0 z-50 bg-stone-950/80 backdrop-blur-sm flex items-end justify-center p-4">
              <div className="w-full max-w-sm bg-stone-900 border border-stone-800 rounded-t-2xl p-5 space-y-4">
                <div className="flex justify-between items-center">
                  <h2 className="text-base font-bold text-stone-100">Add New Garment</h2>
                  <button onClick={() => setIsAddOpen(false)} className="text-stone-400"><XIcon /></button>
                </div>

                <div className="border border-dashed border-stone-800 rounded-xl p-4 text-center cursor-pointer bg-stone-950/40" onClick={() => fileInputRef.current.click()}>
                  {uploadedImage ? (
                    <img src={uploadedImage} className="h-20 mx-auto rounded object-cover" alt="" />
                  ) : (
                    <p className="text-xs text-stone-400">Tap to upload image snapshot</p>
                  )}
                  <input type="file" accept="image/*" ref={fileInputRef} onChange={handleImageUpload} className="hidden" />
                </div>

                <div className="space-y-3 text-xs">
                  <div>
                    <label className="block text-stone-400 font-medium mb-1">Item Title Label</label>
                    <input 
                      type="text" 
                      value={newItemDetails.name} 
                      onChange={e => {
                        const val = e.target.value;
                        setNewItemDetails(prev => Object.assign({}, prev, { name: val }));
                      }} 
                      className="w-full bg-stone-800 border border-stone-700 rounded-lg p-2 text-stone-100 focus:outline-none"
                      placeholder="e.g., Denim Vintage Jacket"
                    />
                  </div>

                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="block text-stone-400 font-medium mb-1">Category Type</label>
                      <select 
                        value={newItemDetails.category} 
                        onChange={e => {
                          const val = e.target.value;
                          setNewItemDetails(prev => Object.assign({}, prev, { category: val }));
                        }}
                        className="w-full bg-stone-800 border border-stone-700 rounded-lg p-2 text-stone-100 focus:outline-none"
                      >
                        {['Top', 'Bottom', 'Outerwear', 'Shoes', 'Accessory'].map(c => <option key={c} value={c}>{c}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="block text-stone-400 font-medium mb-1">Style Segment</label>
                      <select 
                        value={newItemDetails.style} 
                        onChange={e => {
                          const val = e.target.value;
                          setNewItemDetails(prev => Object.assign({}, prev, { style: val }));
                        }}
                        className="w-full bg-stone-800 border border-stone-700 rounded-lg p-2 t
