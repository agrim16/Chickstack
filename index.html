<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ChicStack OOTD AI</title>
  
  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .scrollbar-none::-webkit-scrollbar { display: none; }
    .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body class="bg-stone-950 text-stone-100 min-h-screen antialiased">

  <div class="min-h-screen pb-24 max-w-md mx-auto bg-stone-900 shadow-2xl relative border-x border-stone-800">
    
    <header class="p-4 border-b border-stone-800 bg-stone-900/80 sticky top-0 z-40 backdrop-blur-md flex flex-col gap-3">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-xl font-bold tracking-tight text-stone-100">ChicStack</h1>
          <button onclick="manageApiKey()" id="api-status-btn" class="text-[10px] text-red-400 bg-red-500/10 px-2 py-0.5 rounded-full mt-0.5">⚠️ No API Key Configured</button>
        </div>
        <button onclick="openAddModal()" class="p-2 bg-amber-500 text-stone-950 rounded-full font-bold shadow-lg hover:bg-amber-400">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
        </button>
      </div>

      <div class="flex items-center gap-2 bg-stone-950/50 p-2 rounded-xl border border-stone-800/60">
        <span class="text-xs text-stone-400 font-medium pl-1">Profile:</span>
        <select id="profile-select" onchange="handleProfileChange(this)" class="bg-stone-800 text-amber-400 text-xs font-semibold rounded-lg p-1.5 flex-1 focus:outline-none border border-stone-700">
          </select>
      </div>
    </header>

    <main class="p-4">
      
      <div id="tab-wardrobe" class="tab-content active">
        <div class="flex gap-2 overflow-x-auto pb-3 scrollbar-none mb-4" id="category-filters"></div>
        <div class="grid grid-cols-2 gap-3" id="closet-grid"></div>
      </div>

      <div id="tab-matcher" class="tab-content space-y-4">
        <div class="bg-stone-800/40 border border-stone-800 rounded-2xl p-4 space-y-3">
          <h2 class="text-sm font-semibold text-stone-400 tracking-wider uppercase mb-2">Current Stack Workspace</h2>
          <div id="canvas-slots" class="space-y-3"></div>
        </div>
        <button onclick="analyzeCanvasOotd()" id="canvas-ai-btn" class="w-full py-3 bg-amber-500 text-stone-950 font-bold rounded-xl flex items-center justify-center gap-2 transition disabled:opacity-40">
          ⚡ Analyze Outfit Stack with AI
        </button>
        <div id="canvas-ai-result" class="hidden bg-stone-800/50 border border-amber-500/20 rounded-xl p-4 text-xs text-stone-200 leading-relaxed space-y-2"></div>
      </div>

      <div id="tab-selfie" class="tab-content space-y-4">
        <div class="border border-dashed border-stone-800 rounded-2xl p-6 text-center bg-stone-900/50 cursor-pointer" onclick="document.getElementById('selfie-input').click()">
          <div id="selfie-preview-placeholder" class="space-y-2 py-4">
            <div class="mx-auto w-12 h-12 rounded-full bg-stone-800 flex items-center justify-center text-stone-400">📷</div>
            <p class="text-sm font-medium text-stone-300">Snap or Upload Fit Portrait</p>
          </div>
          <img id="selfie-display" class="hidden max-h-64 mx-auto rounded-xl object-cover" alt="Selfie" />
          <input type="file" id="selfie-input" accept="image/*" class="hidden" onchange="loadSelfie(event)" />
        </div>

        <button onclick="rateSelfieWithAi()" id="selfie-ai-btn" class="w-full py-3 bg-stone-100 text-stone-950 font-bold rounded-xl disabled:opacity-40">
          Submit to Gemini Virtual Judges
        </button>

        <div id="judges-panel" class="hidden bg-stone-800/50 border border-stone-700/60 rounded-xl p-4 text-xs text-stone-200 leading-relaxed space-y-2"></div>
      </div>

    </main>

    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-stone-900/90 border-t border-stone-800 backdrop-blur-md grid grid-cols-3 py-2.5 text-stone-400 z-40 shadow-xl">
      <button onclick="switchTab('wardrobe')" id="nav-wardrobe" class="flex flex-col items-center gap-1 text-[10px] font-semibold text-amber-400"><span>🧥</span> Closet</button>
      <button onclick="switchTab('matcher')" id="nav-matcher" class="flex flex-col items-center gap-1 text-[10px] font-semibold"><span>🥞</span> OOTD Canvas</button>
      <button onclick="switchTab('selfie')" id="nav-selfie" class="flex flex-col items-center gap-1 text-[10px] font-semibold"><span>📸</span> Style Rater</button>
    </nav>

    <div id="add-modal" class="hidden fixed inset-0 z-50 bg-stone-950/80 backdrop-blur-sm flex items-end justify-center p-4">
      <div class="w-full max-w-sm bg-stone-900 border border-stone-800 rounded-t-2xl p-5 space-y-4">
        <div class="flex justify-between items-center">
          <h2 class="text-base font-bold text-stone-100">Add New Garment</h2>
          <button onclick="closeAddModal()" class="text-stone-400">✕</button>
        </div>
        <div class="border border-dashed border-stone-800 rounded-xl p-4 text-center cursor-pointer bg-stone-950/40" onclick="document.getElementById('item-img-input').click()">
          <span id="item-img-placeholder" class="text-xs text-stone-400">Tap to upload clothing snapshot image</span>
          <img id="item-img-display" class="hidden h-20 mx-auto object-cover rounded" />
          <input type="file" id="item-img-input" accept="image/*" class="hidden" onchange="loadItemImage(event)">
        </div>
        <input type="text" id="item-name" class="w-full bg-stone-800 border border-stone-700 rounded-lg p-2 text-xs" placeholder="e.g., Denim Vintage Jacket">
        <div class="grid grid-cols-2 gap-2 text-xs">
          <select id="item-category" class="bg-stone-800 border border-stone-700 rounded-lg p-2 text-stone-100">
            <option>Top</option><option>Bottom</option><option>Outerwear</option><option>Shoes</option><option>Accessory</option>
          </select>
          <select id="item-style" class="bg-stone-800 border border-stone-700 rounded-lg p-2 text-stone-100">
            <option>Casual</option><option>Formal</option><option>Streetwear</option><option>Minimalist</option>
          </select>
        </div>
        <button onclick="saveItem()" class="w-full py-2.5 bg-amber-500 text-stone-950 font-bold rounded-lg text-xs">Save to Closet</button>
      </div>
    </div>

  </div>

  <script>
    // Global variable tracking
    var profiles = [];
    var currentProfile = 'Default Profile';
    var wardrobe = [];
    var equipped = { Outerwear: null, Top: null, Bottom: null, Shoes: null, Accessory: null };
    var currentFilter = 'All';
    var currentItemBase64 = "";
    var apiKey = "";

    // Initialization safeguard
    window.onload = function() {
      try {
        profiles = JSON.parse(localStorage.getItem('chicstack_profiles')) || ['Default Profile'];
        currentProfile = localStorage.getItem('chicstack_current_profile') || 'Default Profile';
        apiKey = localStorage.getItem('chicstack_gemini_key') || "";
        
        checkApiKey();
        loadProfileData();
      } catch (e) {
        alert("Startup error: " + e.message);
      }
    };

    function loadProfileData() {
      var storageKey = 'chicstack_w_' + currentProfile.replace(/\s+/g, '_');
      try {
        wardrobe = JSON.parse(localStorage.getItem(storageKey)) || [
          { id: '1', name: 'Classic Beige Trench', category: 'Outerwear', style: 'Formal', image: '' },
          { id: '2', name: 'Vintage White Tee', category: 'Top', style: 'Casual', image: '' },
          { id: '3', name: 'Relaxed Denim Jeans', category: 'Bottom', style: 'Casual', image: '' },
          { id: '4', name: 'Minimalist Sneakers', category: 'Shoes', style: 'Minimalist', image: '' }
        ];
      } catch (err) {
        wardrobe = [];
      }
      equipped = { Outerwear: null, Top: null, Bottom: null, Shoes: null, Accessory: null };
      
      renderProfileDropdown();
      renderFilters();
      renderCloset();
      renderCanvas();
    }

    function saveProfileData() {
      var storageKey = 'chicstack_w_' + currentProfile.replace(/\s+/g, '_');
      localStorage.setItem(storageKey, JSON.stringify(wardrobe));
    }

    function renderProfileDropdown() {
      var select = document.getElementById('profile-select');
      if (!select) return;
      var optionsHTML = profiles.map(function(p) {
        return '<option value="' + p + '" ' + (p === currentProfile ? 'selected' : '') + '>' + p + '</option>';
      }).join('');
      optionsHTML += '<option value="__NEW__">＋ Create New Profile...</option>';
      select.innerHTML = optionsHTML;
    }

    function handleProfileChange(selectElement) {
      var value = selectElement.value;
      if (value === '__NEW__') {
        var name = prompt("Enter a name for the new profile:");
        if (name && name.trim()) {
          var profileName = name.trim();
          if (profiles.indexOf(profileName) === -1) {
            profiles.push(profileName);
            localStorage.setItem('chicstack_profiles', JSON.stringify(profiles));
          }
          currentProfile = profileName;
          localStorage.setItem('chicstack_current_profile', currentProfile);
        }
      } else {
        currentProfile = value;
        localStorage.setItem('chicstack_current_profile', currentProfile);
      }
      loadProfileData();
    }

    function checkApiKey() {
      var btn = document.getElementById('api-status-btn');
      if (!btn) return;
      if (apiKey) {
        btn.innerText = "🟢 Gemini AI Connected";
        btn.className = "text-[10px] text-emerald-400 bg-emerald-500/10 px-2 py-0.5 rounded-full mt-0.5";
      } else {
        btn.innerText = "⚠️ No API Key Configured";
        btn.className = "text-[10px] text-red-400 bg-red-500/10 px-2 py-0.5 rounded-full mt-0.5";
      }
    }

    function manageApiKey() {
      var entry = prompt("Please provide your Google AI Studio Gemini API Key:", apiKey);
      if (entry !== null) {
        apiKey = entry.trim();
        localStorage.setItem('chicstack_gemini_key', apiKey);
        checkApiKey();
      }
    }

    async function analyzeCanvasOotd() {
      if (!apiKey) return alert("Configure your Gemini API Key using the status header bar toggle first.");
      
      var outfitItems = [];
      for (var cat in equipped) {
        if (equipped[cat]) outfitItems.push(cat + ": " + equipped[cat].name + " (" + equipped[cat].style + ")");
      }
      if (outfitItems.length === 0) return alert("Dress up at least one workspace item slot on your active canvas first.");

      var btn = document.getElementById('canvas-ai-btn');
      var box = document.getElementById('canvas-ai-result');
      btn.innerText = "Consulting Gemini Stylist AI...";
      btn.disabled = true;
      box.classList.remove('hidden');
      box.innerText = "Analyzing alignment, color layers, and thematic presentation sync profiles...";

      try {
        var url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + apiKey;
        var promptText = "Act as an expert high-fashion stylist. Analyze this chosen combination stack for a profile named " + currentProfile + ": " + outfitItems.join(', ') + ". Give a brief critique, an overall profile compatibility score from 0-100, and 2 quick punchy suggestions to upgrade the style synergy. Keep the reply clean and conversational.";
        
        var payload = { contents: [{ parts: [{ text: promptText }] }] };
        
        var res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
        var data = await res.json();
        box.innerText = data.candidates[0].content.parts[0].text;
      } catch (err) {
        box.innerText = "Connection Framework Timeout: " + err.message;
      } finally {
        btn.innerText = "⚡ Analyze Outfit Stack with AI";
        btn.disabled = false;
      }
    }

    async function rateSelfieWithAi() {
      if (!apiKey) return alert("Please configure your Gemini API Key first.");
      var displayImg = document.getElementById('selfie-display');
      if (!displayImg || !displayImg.src || displayImg.classList.contains('hidden')) return alert("Please upload an outfit portrait picture first.");

      var btn = document.getElementById('selfie-ai-btn');
      var panel = document.getElementById('judges-panel');
      btn.innerText = "AI Fashion Judges deliberating...";
      btn.disabled = true;
      panel.classList.remove('hidden');
      panel.innerText = "Analyzing portrait layout metrics, fit silhouette composition, and styling aesthetic elements...";

      try {
        var url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + apiKey;
        var base64Data = displayImg.src.split(',')[1];
        var mimeType = displayImg.src.split(';')[0].split(':')[1];
        
        var payload = {
          contents: [{
            parts: [
              { text: "Review this outfit portrait. Be a constructive, smart fashion judge. Give an overall fashion score out of 100, a one-sentence critique summary statement, and two direct improvement suggestions." },
              { inlineData: { mimeType: mimeType, data: base64Data } }
            ]
          }]
        };

        var res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
        var data = await res.json();
        panel.innerText = data.candidates[0].content.parts[0].text;
      } catch (err) {
        panel.innerText = "AI Analysis failed to process layout: " + err.message;
      } finally {
        btn.innerText = "Submit to Gemini Virtual Judges";
        btn.disabled = false;
      }
    }

    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(function(el) { el.classList.remove('active'); });
      document.getElementById('tab-' + tabId).classList.add('active');
      document.querySelectorAll('nav button').forEach(function(el) { el.classList.remove('text-amber-400'); });
      document.getElementById('nav-' + tabId).classList.add('text-amber-400');
    }

    function setFilter(cat) { currentFilter = cat; renderFilters(); renderCloset(); }

    function renderFilters() {
      var cats = ['All', 'Top', 'Bottom', 'Outerwear', 'Shoes', 'Accessory'];
      var target = document.getElementById('category-filters');
      if(!target) return;
      target.innerHTML = cats.map(function(c) {
        return '<button onclick="setFilter(\'' + c + '\')" class="px-3 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap ' + (currentFilter === c ? 'bg-amber-500 text-stone-950' : 'bg-stone-800 text-stone-400') + '">' + c + '</button>';
      }).join('');
    }

    function renderCloset() {
      var grid = document.getElementById('closet-grid');
      if (!grid) return;
      var filtered = currentFilter === 'All' ? wardrobe : wardrobe.filter(function(i) { return i.category === currentFilter; });
      
      if(filtered.length === 0) {
        grid.innerHTML = '<div class="col-span-2 text-center py-12 text-stone-500 text-xs">No garments inside this category.</div>';
        return;
      }

      grid.innerHTML = filtered.map(function(item) {
        var isEquipped = equipped[item.category] && equipped[item.category].id === item.id;
        var mediaElement = item.image ? '<img src="' + item.image + '" class="w-full h-full object-cover" />' : '👚';
        return `
          <div class="p-3 rounded-xl bg-stone-800/50 border ${isEquipped ? 'border-amber-500' : 'border-stone-800'} relative">
            <div class="w-full h-24 rounded-lg bg-stone-800 mb-2 flex items-center justify-center overflow-hidden text-stone-500">
              ${mediaElement}
            </div>
            <h3 class="text-xs font-semibold truncate text-stone-200">${item.name}</h3>
            <div class="flex justify-between items-center mt-2">
              <span class="text-[10px] text-stone-400 px-1.5 py-0.5 rounded bg-stone-900">${item.category}</span>
              <div class="flex gap-1">
                <button onclick="toggleEquip('${item.id}')" class="px-2 py-0.5 rounded text-[10px] font-bold ${isEquipped ? 'bg-amber-500 text-stone-950' : 'bg-stone-700 text-stone-300'}">${isEquipped ? 'Worn' : 'Wear'}</button>
                <button onclick="deleteItem('${item.id}')" class="text-stone-500 text-xs hover:text-red-400">🗑️</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderCanvas() {
      var container = document.getElementById('canvas-slots');
      if (!container) return;
      var slots = ['Outerwear', 'Top', 'Bottom', 'Shoes', 'Accessory'];
      container.innerHTML = slots.map(function(s) {
        var content = equipped[s] ? `
          <div class="flex items-center gap-2">
            <span class="text-xs font-semibold text-amber-400">${equipped[s].name}</span>
            <button onclick="removeSlot('${s}')" class="text-stone-500 text-xs">✕</button>
          </div>
        ` : '<span class="text-xs text-stone-600 italic">Empty Slot</span>';
        return `
          <div class="flex items-center justify-between p-3 rounded-xl bg-stone-900 border border-stone-800">
            <span class="text-xs text-stone-400 font-medium">${s}</span>
            ${content}
          </div>
        `;
      }).join('');
    }

    function toggleEquip(id) {
      var item = wardrobe.find(function(i) { return i.id === id; });
      equipped[item.category] = (equipped[item.category] && equipped[item.category].id === item.id) ? null : item;
      renderCloset(); renderCanvas();
    }

    function removeSlot(slot) { equipped[slot] = null; renderCloset(); renderCanvas(); }
    
    function deleteItem(id) {
      var item = wardrobe.find(function(i) { return i.id === id; });
      if(equipped[item.category] && equipped[item.category].id === id) equipped[item.category] = null;
      wardrobe = wardrobe.filter(function(i) { return i.id !== id; });
      saveProfileData();
      renderCloset(); renderCanvas();
    }

    function openAddModal() { document.getElementById('add-modal').classList.remove('hidden'); }
    function closeAddModal() { 
      document.getElementById('add-modal').classList.add('hidden');
      document.getElementById('item-img-placeholder').classList.remove('hidden');
      document.getElementById('item-img-display').classList.add('hidden');
      currentItemBase64 = "";
    }
    
    function loadItemImage(e) {
      var file = e.target.files[0];
      if(!file) return;
      var r = new FileReader();
      r.onload = function(event) {
        currentItemBase64 = event.target.result;
        document.getElementById('item-img-placeholder').classList.add('hidden');
        var img = document.getElementById('item-img-display');
        img.src = currentItemBase64;
        img.classList.remove('hidden');
        document.getElementById('item-name').value = file.name.split('.')[0];
      };
      r.readAsDataURL(file);
    }

    function saveItem() {
      var name = document.getElementById('item-name').value;
      var category = document.getElementById('item-category').value;
      var style = document.getElementById('item
